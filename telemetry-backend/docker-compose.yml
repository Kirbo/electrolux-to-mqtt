services:
  redis:
    image: redis:7-alpine
    container_name: telemetry-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - telemetry-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  telemetry-backend:
    build:
      context: ../
      dockerfile: ./telemetry-backend/Dockerfile
      args:
        - NODE_VERSION=${NODE_VERSION:-24}
    container_name: telemetry-backend
    env_file: .env
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      # - RATE_LIMIT_WINDOW_MS=60000
      # - RATE_LIMIT_IP_MAX=10
      # - RATE_LIMIT_HASH_MAX=1
      # - RATE_LIMIT_SALT=your-secret-salt
      # - RATE_LIMIT_BREAKER_THRESHOLD=5
      # - RATE_LIMIT_BREAKER_WINDOW_MS=60000
      # - RATE_LIMIT_BREAKER_COOLDOWN_MS=30000
      # - ALLOW_TEST_TELEMETRY=false
      - TELEMETRY_BEHIND_PROXY=true   # Set true ONLY when deployed behind a header-rewriting reverse proxy (Caddy, nginx with explicit X-Forwarded-For overwrite). Default false.
    depends_on:
      - redis
    networks:
      - telemetry-network
    volumes:
      - ./badge:/app/badge
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "512M"

networks:
  telemetry-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
