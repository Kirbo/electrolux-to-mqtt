services:
  telemetry-backend:
    build:
      context: ../
      dockerfile: ./telemetry-backend/Dockerfile
      # BuildKit runs in its own network namespace and cannot reach registry.npmjs.org
      # without host networking. The host can reach it fine; regular docker run containers
      # can too — it is specific to the BuildKit build network. Do not remove.
      network: host
      args:
        - NODE_VERSION=${NODE_VERSION:-24}
    container_name: telemetry-backend
    restart: unless-stopped
    # Published on the host so the reverse proxy reaches it. Port 3001 matches the OLD
    # backend, so the existing nginx /telemetry proxy target doesn't change. (NPM, in its
    # own container, can't reach the host's 127.0.0.1 — proxy to the host IP:3001, or
    # attach this service to NPM's network and proxy to "telemetry-backend:3001".)
    ports:
      - "3001:3001"
    # SOPS-decrypted secrets (CH creds + APTABASE_APP_ID) — see telemetry-backend/.env.example.
    # Run `pnpm sops:decrypt` to generate .env from the committed .env.enc.
    env_file:
      - .env
    environment:
      - PORT=3001
      - APTABASE_HOST=https://aptabase.devaus.eu
      - APTABASE_APP_KEY=A-SH-2414786682
      # Rate limit: 10 requests per 60 s per IP (old bridge checks once/hour max)
      - RATE_LIMIT_REQUESTS=10
      - RATE_LIMIT_WINDOW_MS=60000
      # Badge regeneration interval in seconds (default 300 = every 5 minutes)
      - BADGE_INTERVAL_SECONDS=300
      - OUTPUT_DIR=/app/badge
    volumes:
      # Badge SVGs + telemetry.json are written here and served STATICALLY by nginx, so
      # the high-traffic badge GETs never hit the container. The host side (./badge,
      # gitignored) is what nginx's `root` points at — see nginx/reverse-proxy.conf.
      - ./badge:/app/badge
    networks:
      # Attach to the Aptabase stack's network so the ClickHouse service resolves by
      # service name (e.g. 'aptabase_events_db'). Replace 'aptabase_default' with your
      # actual Aptabase network name (run `docker network ls` to find it).
      - aptabase_default
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"

networks:
  # The Aptabase stack's Docker network — declared external so docker compose does not
  # try to create it. Set the `name` field to your actual Aptabase network name.
  aptabase_default:
    external: true
    name: aptabase_default  # CHANGE THIS to match your real Aptabase network name
