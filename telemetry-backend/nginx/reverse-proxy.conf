# Reverse-proxy reference for e2m.devaus.eu → telemetry-backend.
#
# Drop-in for the OLD backend's model: nginx serves the badge SVGs (+ telemetry.json)
# STATICALLY from the volume the container writes to — so the high-traffic badge GETs
# never hit the container — and proxies only the dynamic endpoints (/telemetry, /stable,
# /beta, /health) to the service on :3001.
#
# `root` must match the host side of the badge volume in docker-compose.yml
# (./badge → telemetry-backend/badge/).
#
# With Nginx Proxy Manager (a container that can't reach the host's 127.0.0.1): point the
# dynamic locations at the host IP:3001, or attach the service to NPM's network and use
# http://telemetry-backend:3001.
#
# acme.sh --issue --stateless -k 2048 -f -d e2m.devaus.eu

server {
  server_name               e2m.devaus.eu;

  include                   /home/kirbo/nginx/includes/all.conf;
  include                   /home/kirbo/nginx/includes/listen_80.conf;
  root                      /home/kirbo/Projects/electrolux-to-mqtt/telemetry-backend/badge/;

  error_log                 /home/kirbo/logs/e2m.error.log;
  access_log                /home/kirbo/logs/e2m.access.log;

  location = / {
    return                  302 /users.svg;
  }

  # Badge images — written by the container, served static. Regenerated each cycle → never cache.
  location ~ ^/(users|stable|beta)\.svg$ {
    add_header              Cache-Control "no-cache, no-store, must-revalidate";
    add_header              Pragma "no-cache";
    add_header              Expires "0";
    try_files               $uri =404;
  }

  location = /telemetry.json {
    default_type            application/json;
    add_header              Cache-Control "no-cache, no-store, must-revalidate";
    add_header              Pragma "no-cache";
    add_header              Expires "0";
    try_files               $uri =404;
  }

  # Dynamic endpoints → the service: POST /telemetry (legacy ingest), GET /telemetry
  # (JSON), GET /stable + /beta (302 redirects), GET /health. (This regex is evaluated
  # after the .svg one, so /stable.svg and /beta.svg stay static.)
  location ~ ^/(telemetry|stable|beta|health)$ {
    proxy_pass              http://127.0.0.1:3001;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        Host $host;
  }

  # Anything else: serve from the badge dir if present, else 404.
  location / {
    try_files               $uri =404;
  }
}
