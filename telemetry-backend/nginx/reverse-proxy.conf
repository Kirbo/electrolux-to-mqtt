# Reverse-proxy reference for e2m.devaus.eu → telemetry-backend.
#
# With HOST nginx (nginx runs directly on the server, service listens on host :3002):
#   proxy_pass http://127.0.0.1:3002;
#
# With Nginx Proxy Manager (NPM runs in a container — cannot reach host 127.0.0.1):
#   Option A (port): proxy to host IP:3002, e.g. http://192.168.1.10:3002 or
#                    http://host-gateway:3002 if NPM supports that alias.
#   Option B (network): attach telemetry-backend to NPM's docker network and proxy
#                    to http://telemetry-backend:3002 by service name.
#
# This single server block replaces the old two-container setup (badge-cron static
# files served by nginx + telemetry-shim proxied for /telemetry). The service now
# handles all routes itself; nginx is a pure reverse proxy with no static root.
#
# acme.sh --issue --stateless -k 2048 -f -d e2m.devaus.eu

server {
  server_name               e2m.devaus.eu;

  include                   /home/kirbo/nginx/includes/all.conf;
  include                   /home/kirbo/nginx/includes/listen_80.conf;

  error_log                 /home/kirbo/logs/e2m.error.log;
  access_log                /home/kirbo/logs/e2m.access.log;

  # Proxy everything to the telemetry-backend service.
  # The service handles routing: GET / → 302 /users.svg, badge routes, /telemetry, /health.
  location / {
    proxy_pass              http://127.0.0.1:3002;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        Host $host;
  }
}
