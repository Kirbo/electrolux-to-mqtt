sonar.projectKey=kirbo_electrolux-to-mqtt
sonar.organization=kirbo
sonar.projectName=electrolux-to-mqtt

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts,**/*.config.*,**/build/**,.scannerwork/**,**/tests/e2e/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/tests/e2e/**

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Additional coverage formats (SonarQube will try to read all available formats)
sonar.coverage.exclusions=**/tests/**,**/*.test.ts,**/*.spec.ts,**/vitest.*.ts,**/vitest.setup.ts,**telemetry-backend/**

# SonarQube project-wide coverage minimums (vitest enforces stricter per-file thresholds)
# These are lower because SonarQube measures overall coverage including excluded paths
sonar.coverage.overall_line.minimum=75
sonar.coverage.overall_branch.minimum=60
sonar.coverage.overall_function.minimum=80
sonar.coverage.overall_statement.minimum=75

# Test execution reports (if you add test execution data in the future)
# sonar.testExecutionReportPaths=test-report.xml

# Code duplication
sonar.cpd.exclusions=**/tests/**,**telemetry-backend/**

# Language-specific settings
sonar.sourceEncoding=UTF-8

# Block on quality gate result so `pnpm sonar` fails locally when the gate fails
sonar.qualitygate.wait=true
