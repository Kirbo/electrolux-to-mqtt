mqtt:
  # (Optional) Unique client ID for the MQTT connection. Default: electrolux-comfort600
  clientId: electrolux-comfort600
  # (Required) MQTT broker URL (mqtt:// or mqtts://)
  url: mqtt://192.168.0.1:1883
  # (Required) MQTT broker username
  username: mqttUser
  # (Required) MQTT broker password
  password: mqttPassword
  # (Optional) Prefix for all MQTT topics. Default: electrolux_
  topicPrefix: electrolux_
  # (Optional) Retain MQTT messages. Default: false
  retain: false
  # (Optional) MQTT QoS level: 0 = At most once, 1 = At least once, 2 = Exactly once. Default: 2
  qos: 2

electrolux:
  # (Required) Electrolux API key. Get yours from https://developer.electrolux.one/dashboard
  apiKey: your_api_key_here
  # (Required) Electrolux account email
  username: your_email_here
  # (Required) Electrolux account password
  password: your_password_here
  # (Required) Two-letter uppercase country code (e.g. FI, SE, NO, DK)
  countryCode: your_country_code_here
  # (Optional) Appliance state polling interval in seconds. Default: 30, Min: 10, Max: 3600
  refreshInterval: 30
  # (Optional) Appliance discovery interval in seconds (how often to check for added/removed appliances). Default: 300, Min: 60, Max: 3600
  applianceDiscoveryInterval: 300
  # (Optional) How many minutes before expiration should the token be refreshed.
  # E.g. 60 means: refresh the token when it has 60 minutes or less until it expires.
  # API tokens have a 12-hour (720 min) lifetime. Default: 60, Min: 5, Max: 715.
  renewTokenBeforeExpiry: 60
  # (Optional) Seconds to wait after sending a command before re-polling appliance state.
  # The Electrolux API caches appliance state server-side; without this delay, the first
  # poll after a command returns the pre-command state (cache not yet invalidated), which
  # would overwrite the correct HA state with stale data and then self-correct only on the
  # next full poll cycle. 30 s gives the API cache time to reflect the new state.
  # Increase if your appliance is slow to apply commands. Default: 30, Min: 5, Max: 300.
  commandStateDelaySeconds: 30
  # (Optional) Minutes an appliance must be continuously absent from successful discovery
  # responses before the bridge treats it as removed and cleans up its HA entity/subscription.
  # API failures (4xx/5xx, network errors, malformed responses) are ignored entirely and never
  # trigger cleanup. A clean 200 that omits an appliance starts the timer; the appliance is only
  # removed if it stays absent across successive successful responses for this many minutes.
  # Default: 30, Min: 1, Max: 1440.
  applianceRemovalGracePeriodMinutes: 30
  # (Optional) HTTP request timeout in seconds for Electrolux API calls.
  # The Electrolux GET /appliances/{id}/state endpoint can return HTTP 500 after ~15.5 s for
  # some appliances. The default 25 s is deliberately longer than that so the real upstream
  # error surfaces in logs instead of a premature client-side timeout. Reduce only if you
  # want faster failure detection and don't need the upstream error reason. Default: 25, Min: 1, Max: 120.
  apiTimeoutSeconds: 25

homeAssistant:
  # (Optional) Automatically discover the device in Home Assistant. Default: true
  autoDiscovery: true
  # (Optional) Immediately revert HA state when a command is rejected by validation. Default: false
  # When false, the UI stays on the invalid value until the next poll corrects it (~30s).
  # When true, the state snaps back immediately but may cause UI flicker.
  revertStateOnRejection: false
  # (Optional) Re-publish discovery config + cached state when Home Assistant comes online.
  # HA publishes a "birth" message to homeassistant/status when its MQTT integration starts.
  # Without retain, HA entities show as "Unavailable" after an HA restart until the bridge
  # next polls and state changes. This feature avoids that by republishing immediately on birth.
  # Default: true
  birthRepublish: true
  # (Optional) MQTT topic HA publishes its birth/will message to. Default: homeassistant/status
  statusTopic: homeassistant/status
  # (Optional) Payload that signals HA is online. Default: online
  birthPayload: online

logging:
  # (Optional) Log level (silent, fatal, error, warn, info, debug, trace). Default: info
  logLevel: info
  # (Optional) Log state changes detected in appliance state. Default: true
  showChanges: true
  # (Optional) Keys to ignore when detecting state changes (e.g., networkInterface.rssi)
  ignoredKeys:
    - networkInterface
    - totalRuntime
  #   - logE
  #   - logW
  # (Optional) Show version number in log prefix. Default: true
  showVersionNumber: true
  # (Optional) Suppress cache debug logs. Default: true
  skipCacheLogging: true
  # (Optional) Show timestamp in log messages. Default: true
  showTimestamp: true

versionCheck:
  # (Optional) How often to check for new versions, in seconds. Default: 3600 (1 hour), Min: 60, Max: 86400 (24 hours)
  checkInterval: 3600
  # (Optional) Minimum age (seconds) a release must reach before you are notified. Default: 3600 (1 hour), Min: 0 (notify immediately), Max: 604800 (7 days)
  notifyGracePeriod: 3600
  # (Optional) ntfy.sh webhook URL for notifications when a new version is found.
  # Example: https://ntfy.sh/vB66ozQaRiqhTE9j
  ntfyWebhookUrl: https://ntfy.sh/your_topic_here
  # (Optional) Which releases to track.
  # The default channel is baked into the Docker image at build time:
  #   :latest image → stable (skips pre-release builds)
  #   :next   image → beta   (includes pre-release builds)
  # Omit this field to use the image default. Set explicitly only to override:
  #   updateChannel: stable   — always track stable, even when running :next
  #   updateChannel: beta     — always track beta,   even when running :latest
  # updateChannel: stable

healthCheck:
  # (Optional) Enable file-based health check for Docker HEALTHCHECK. Default: true
  enabled: true
  # (Optional) Path to the health check file. Default: /tmp/e2m-health
  filePath: /tmp/e2m-health
  # (Optional) Minutes of sustained API failure before the container exits for Docker to restart it. Default: 45 (range: 10–1440)
  unHealthyRestartMinutes: 45

# (Optional) Send anonymous telemetry during version checks: app version, update channel
# (stable/beta), OS name and version, CPU architecture, and connected-appliance model id(s)
# and count. Sent to a self-hosted Aptabase instance. Aptabase derives an approximate country
# from the request IP and a daily-rotating non-reversible visitor id (IP+user-agent+daily salt)
# — no stable device id, username, or personal data is sent or stored.
# Default: true. Set to false to opt out entirely. Version checking still runs regardless.
telemetryEnabled: true
