# https://docs.gitlab.com/ci/variables/
# https://gitlab-docs-d6a9bb.gitlab.io/ee/ci/variables/predefined_variables.html
# https://docs.gitlab.com/ci/yaml/

stages:
  - init
  - test
  - build
  - release

workflow:
  rules:
    # Run pipeline for pushes to default branch
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    # Run pipeline for pushes to next (pre-release) branch
    - if: '$CI_COMMIT_BRANCH == "next"'
    # Run pipeline for all other branch pushes
    - if: "$CI_COMMIT_BRANCH"
    # Run pipeline for web/api triggers
    - if: '$CI_PIPELINE_SOURCE == "web"'

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_REGISTRY: ${CI_REGISTRY}
  DOCKER_BUILDER_NAME: "builder-${CI_JOB_ID}"
  DOCKERHUB_PASSWORD: ${CI_REGISTRY_PASSWORD}
  DOCKERHUB_PASSWORD_READ: ${CI_REGISTRY_PASSWORD_READ}
  DOCKERHUB_REPOSITORY: kirbownz/electrolux-to-mqtt
  DOCKERHUB_USERNAME: ${CI_REGISTRY_USERNAME}
  README_FILEPATH: ${CI_PROJECT_DIR}/README.md
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
  GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  GIT_STRATEGY: clone
  GITLAB_TOKEN: ${CI_JOB_TOKEN}

# Default configuration for all jobs
default:
  # Prefer private runner (macos tag), fallback to shared runners if unavailable
  # Jobs without the macos tag will use shared runners automatically
  tags:
    - macos

################################################################### SHARED RULES ######################################################################

.rules_code_changes:
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never

.rules_code_changes_or_schedule:
  rules:
    - if: '$SCHEDULE == "AUDIT"'
      when: never
    - if: $SCHEDULE
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - telemetry-backend/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never

.rules_node_changes:
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
        - docker/Dockerfile
      when: on_success
    - when: never

.rules_node_changes_or_schedule:
  rules:
    - if: '$SCHEDULE == "AUDIT"'
      when: never
    - if: $SCHEDULE
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
        - docker/Dockerfile
      when: on_success
    - when: never

################################################################### DOCKER SHARED TEMPLATE ##################################################################

# Shared base for all docker buildx jobs. Extending jobs override: rules, stage, needs, script.
# try-to-build overrides DOCKER_REGISTRY_PASSWORD to ${DOCKERHUB_PASSWORD_READ} (no push needed).
.docker_build_base:
  image: docker:latest
  retry: 1
  interruptible: true
  allow_failure: false
  cache: []
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
    DOCKER_REGISTRY_PASSWORD: ${DOCKERHUB_PASSWORD}
  before_script:
    - export BUILDER_NAME="${DOCKER_BUILDER_NAME:-shared-ci-builder}"
    - docker buildx inspect "${BUILDER_NAME}" >/dev/null 2>&1 || docker buildx create --name "${BUILDER_NAME}" --driver docker-container --use
    - echo "${DOCKER_REGISTRY_PASSWORD}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin "${DOCKER_REGISTRY}"
    - echo "${DOCKERHUB_PASSWORD_READ}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin dhi.io
  after_script:
    - docker buildx rm "${BUILDER_NAME}" || true

################################################################### INCLUDES ######################################################################

include:
  - local: .gitlab/ci/01_init.yml
  - local: .gitlab/ci/02_test.yml
  - local: .gitlab/ci/03_build.yml
  - local: .gitlab/ci/04_release.yml
