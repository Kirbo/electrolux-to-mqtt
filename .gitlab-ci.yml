# https://docs.gitlab.com/ci/variables/
# https://gitlab-docs-d6a9bb.gitlab.io/ee/ci/variables/predefined_variables.html
# https://docs.gitlab.com/ci/yaml/

stages:
  - init
  - test
  - build
  - release

workflow:
  rules:
    # Run pipeline for pushes to default branch
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    # Run pipeline for pushes to next (pre-release) branch
    - if: '$CI_COMMIT_BRANCH == "next"'
    # Run pipeline for all other branch pushes
    - if: "$CI_COMMIT_BRANCH"
    # Run pipeline for web/api triggers
    - if: '$CI_PIPELINE_SOURCE == "web"'

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_REGISTRY: ${CI_REGISTRY}
  DOCKER_BUILDER_NAME: "builder-${CI_JOB_ID}"
  DOCKERHUB_PASSWORD: ${CI_REGISTRY_PASSWORD}
  DOCKERHUB_PASSWORD_READ: ${CI_REGISTRY_PASSWORD_READ}
  DOCKERHUB_REPOSITORY: kirbownz/electrolux-to-mqtt
  DOCKERHUB_USERNAME: ${CI_REGISTRY_USERNAME}
  README_FILEPATH: ${CI_PROJECT_DIR}/README.md
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # Defines the location of the analysis task cache
  GIT_DEPTH: "0" # Tells git to fetch all the branches of the project, required by the analysis task
  GIT_STRATEGY: clone
  GITLAB_TOKEN: ${CI_JOB_TOKEN}

# Default configuration for all jobs
default:
  # Prefer private runner (macos tag), fallback to shared runners if unavailable
  # Jobs without the macos tag will use shared runners automatically
  tags:
    - macos

################################################################### SHARED RULES ######################################################################

.rules_code_changes: &rules_code_changes
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never

.rules_code_changes_or_schedule: &rules_code_changes_or_schedule
  rules:
    - if: $SCHEDULE
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - telemetry-backend/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never

.rules_node_changes: &rules_node_changes
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
        - docker/Dockerfile
      when: on_success
    - when: never

.rules_node_changes_or_schedule: &rules_node_changes_or_schedule
  rules:
    - if: $SCHEDULE
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
        - docker/Dockerfile
      when: on_success
    - when: never

################################################################### INIT STAGE JOBS ###################################################################

initialise variables:
  stage: init
  image: alpine:latest
  interruptible: true
  <<: *rules_code_changes_or_schedule
  cache: []
  artifacts:
    reports:
      dotenv: variables.env
  script:
    - touch variables.env
    - echo "NODE_VERSION=$(cat .nvmrc)-alpine3.23" >> variables.env

bump version:
  stage: init
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  interruptible: true
  <<: *rules_code_changes
  cache: []
  artifacts:
    paths:
      - .version-unreleased
      - build.env
      - UNRELEASED-CHANGELOG.md
      - sonar-project.properties
    expire_in: never
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
    - git fetch origin "$CI_DEFAULT_BRANCH" || true
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "next" ]; then
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --prerelease --dry
        BASE_VERSION=$(cat .version-unreleased)
        LAST_N=$(git tag --list "v${BASE_VERSION}-rc.*" | sed 's/.*-rc\.//' | sort -n | tail -1)
        N=$(( ${LAST_N:-0} + 1 ))
        RC_VERSION="${BASE_VERSION}-rc.${N}"
        echo "${RC_VERSION}" > .version-unreleased
        sed -i "s/## ${BASE_VERSION}/## ${RC_VERSION}/" UNRELEASED-CHANGELOG.md
      else
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry
      fi
    - export VERSION=$(cat .version-unreleased)
    - echo "VERSION=${VERSION}" > build.env
    - echo "sonar.projectVersion=${VERSION}" >> sonar-project.properties
    - cat UNRELEASED-CHANGELOG.md

install dependencies:
  stage: init
  image: node:${NODE_VERSION}
  interruptible: true
  <<: *rules_node_changes_or_schedule
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: push
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - echo "Node version from .nvmrc:"
    - echo "$(cat .nvmrc)"
    - node --version
    - npm --version
    - pnpm --version
  script:
    - echo "Installing dependencies..."
    - pnpm install --config.scripts-prepend-node-path=true

################################################################### TEST STAGE JOBS ###################################################################

test:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  <<: *rules_node_changes
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: pull
  needs:
    - job: initialise variables
      artifacts: true
    - job: install dependencies
      artifacts: false
  coverage: '/All files(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*[0-9.]+(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*[0-9.]+(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*[0-9.]+(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*([0-9.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  before_script:
    - echo "Running tests with coverage..."
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    - FORCE_COLOR=1 pnpm test
  allow_failure: false

lint:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  <<: *rules_node_changes
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: pull
  needs:
    - job: initialise variables
      artifacts: true
    - job: install dependencies
      artifacts: false
  before_script:
    - echo "Running linter checks..."
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm biome check .
  allow_failure: false

typecheck:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  <<: *rules_node_changes
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: pull
  needs:
    - job: initialise variables
      artifacts: true
    - job: install dependencies
      artifacts: false
  before_script:
    - echo "Running type checking..."
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm typecheck
  allow_failure: false

audit:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  rules:
    - if: '$SCHEDULE == "AUDIT"'
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - package.json
        - pnpm-lock.yaml
      when: on_success
    - when: never
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: pull
  needs:
    - job: initialise variables
      artifacts: true
    - job: install dependencies
      artifacts: false
  before_script:
    - echo "Running security audit..."
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm audit
  allow_failure: false

sonarcloud-check:
  stage: test
  timeout: 5 minutes
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == \"main\""
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never
  retry: 2
  interruptible: true
  allow_failure: false
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  cache:
    key: sonar-${CI_DEFAULT_BRANCH}
    paths:
      - .sonar/cache
    policy: pull-push
  needs:
    - job: bump version
      artifacts: true
    - job: install dependencies
      artifacts: false
    - job: test
      artifacts: true
  before_script:
    - test -f coverage/lcov.info && echo "LCOV report found" || echo "LCOV report NOT found"
    - test -f coverage/cobertura-coverage.xml && echo "Cobertura report found" || echo "Cobertura report NOT found"
  script:
    - sonar-scanner

telemetry-backend test:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - telemetry-backend/**/*
      when: on_success
    - when: never
  cache: []
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - echo "Running telemetry-backend tests..."
    - corepack enable
    - corepack install
  script:
    - cd telemetry-backend && pnpm install --frozen-lockfile && pnpm typecheck && pnpm test
  allow_failure: false

################################################################## BUILD STAGE JOBS ###################################################################

try to build docker images:
  stage: build
  image: docker:latest
  retry: 1
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "next"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock" # Use local Docker for shell executor
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
    - job: sonarcloud-check
      artifacts: false
      optional: true
  before_script:
    - export BUILDER_NAME="${DOCKER_BUILDER_NAME:-shared-ci-builder}"
    - docker buildx inspect "${BUILDER_NAME}" >/dev/null 2>&1 || docker buildx create --name "${BUILDER_NAME}" --driver docker-container --use
    - echo "${DOCKERHUB_PASSWORD_READ}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin "${DOCKER_REGISTRY}"
    - echo "${DOCKERHUB_PASSWORD_READ}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin dhi.io
  script:
    - source build.env
    - |
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --platform linux/amd64,linux/arm64 \
        -t kirbownz/electrolux-to-mqtt:latest \
        -f docker/Dockerfile .
  after_script:
    - docker buildx rm "${BUILDER_NAME}" || true

################################################################# RELEASE STAGE JOBS ##################################################################

generate changelog:
  image: kirbownz/combine-changelogs:latest
  stage: build
  interruptible: true
  allow_failure: false
  <<: *rules_code_changes
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
  artifacts:
    paths:
      - CHANGELOG.md
  script:
    - combine-changelogs -include UNRELEASED-CHANGELOG.md

build and deploy docker images:
  stage: release
  image: docker:latest
  retry: 1
  interruptible: true
  allow_failure: false
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock" # Use local Docker for shell executor
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
    - job: sonarcloud-check
      artifacts: false
      optional: true
    - job: generate changelog
      artifacts: true
  before_script:
    - export BUILDER_NAME="${DOCKER_BUILDER_NAME:-shared-ci-builder}"
    - docker buildx inspect "${BUILDER_NAME}" >/dev/null 2>&1 || docker buildx create --name "${BUILDER_NAME}" --driver docker-container --use
    - echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin "${DOCKER_REGISTRY}"
    - echo "${DOCKERHUB_PASSWORD_READ}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin dhi.io
  script:
    - source build.env
    - |
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --push \
        --provenance=true \
        --sbom=true \
        --platform linux/amd64,linux/arm64 \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:${VERSION} \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:latest \
        -f docker/Dockerfile .
  after_script:
    - docker buildx rm "${BUILDER_NAME}" || true

create gitlab release:
  stage: release
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  needs:
    - job: initialise variables
      artifacts: false
    - job: bump version
      artifacts: true
    - job: build and deploy docker images
      artifacts: false
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
    - git fetch origin "$CI_DEFAULT_BRANCH" || true
  script:
    - semantic-release --allow-no-changes

build and deploy rc docker images:
  stage: release
  image: docker:latest
  retry: 1
  interruptible: true
  allow_failure: false
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "next"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
    - job: sonarcloud-check
      artifacts: false
      optional: true
    - job: generate changelog
      artifacts: true
  before_script:
    - export BUILDER_NAME="${DOCKER_BUILDER_NAME:-shared-ci-builder}"
    - docker buildx inspect "${BUILDER_NAME}" >/dev/null 2>&1 || docker buildx create --name "${BUILDER_NAME}" --driver docker-container --use
    - echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin "${DOCKER_REGISTRY}"
    - echo "${DOCKERHUB_PASSWORD_READ}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin dhi.io
  script:
    - source build.env
    - |
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --push \
        --provenance=true \
        --sbom=true \
        --platform linux/amd64,linux/arm64 \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:${VERSION} \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:next \
        -f docker/Dockerfile .
  after_script:
    - docker buildx rm "${BUILDER_NAME}" || true

create gitlab prerelease:
  stage: release
  image: alpine:latest
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "next"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  needs:
    - job: initialise variables
      artifacts: false
    - job: bump version
      artifacts: true
    - job: build and deploy rc docker images
      artifacts: false
  before_script:
    - apk add --no-cache curl jq
  script:
    - source build.env
    - TAG="v${VERSION}"
    - |
      HTTP_STATUS=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg name "${TAG}" \
          --arg tag_name "${TAG}" \
          --arg ref "${CI_COMMIT_SHA}" \
          --rawfile description UNRELEASED-CHANGELOG.md \
          '{name: $name, tag_name: $tag_name, ref: $ref, description: $description}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      if [ "${HTTP_STATUS}" = "201" ]; then
        echo "Release ${TAG} created"
      elif [ "${HTTP_STATUS}" = "409" ]; then
        echo "Release ${TAG} already exists, skipping"
      else
        echo "Failed to create release (HTTP ${HTTP_STATUS}):"
        cat /tmp/release_response.json
        exit 1
      fi

update telemetry backend:
  stage: release
  image: alpine:latest
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - telemetry-backend/**/*
      when: on_success
    - when: never
  cache: []
  needs:
    - job: build and deploy docker images
      artifacts: false
      optional: true
    - job: telemetry-backend test
      artifacts: false
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "${SSH_KEY}" | base64 -d > ~/.ssh/id_rsa
    - chmod 700 ~/.ssh
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -t rsa ${TELEMETRY_HOST} >> ~/.ssh/known_hosts
  script:
    - ssh ${TELEMETRY_USER}@${TELEMETRY_HOST} "cd ${TELEMETRY_PATH} && ./telemetry-backend/update.sh"

update dockerhub description:
  stage: release
  image: peterevans/dockerhub-description:4
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      when: on_success
    - when: never
  cache: []
  needs:
    - job: build and deploy docker images
      artifacts: false
      optional: true
  script:
    - "--pipeline"
