################################################################### SHARED TEMPLATES ###################################################################

.osv_scanner:
  image: alpine:3
  interruptible: true
  cache: []
  before_script:
    - ARCH=$(uname -m); [ "$ARCH" = "x86_64" ] && ARCH="amd64" || ARCH="arm64"
    - wget -q "https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_${ARCH}" -O /usr/local/bin/osv-scanner
    - chmod +x /usr/local/bin/osv-scanner

################################################################### TEST STAGE JOBS ###################################################################

test:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: pull
  needs:
    - job: initialise variables
      artifacts: true
    - job: install dependencies
      artifacts: false
  coverage: '/All files(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*[0-9.]+(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*[0-9.]+(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*[0-9.]+(?:\s*\x1b\[[0-9;]*m)?\s*\|(?:\s*\x1b\[[0-9;]*m)?\s*([0-9.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  before_script:
    - echo "Running tests with coverage..."
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    - FORCE_COLOR=1 pnpm test
  allow_failure: false

lint:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: pull
  needs:
    - job: initialise variables
      artifacts: true
    - job: install dependencies
      artifacts: false
  before_script:
    - echo "Running linter checks..."
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm biome check .
  allow_failure: false

typecheck:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: pull
  needs:
    - job: initialise variables
      artifacts: true
    - job: install dependencies
      artifacts: false
  before_script:
    - echo "Running type checking..."
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm typecheck
  allow_failure: false

audit:
  extends: .osv_scanner
  stage: test
  rules:
    - if: '$SCHEDULE == "AUDIT"'
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - package.json
        - pnpm-lock.yaml
      when: on_success
    - when: never
  script:
    - sh scripts/osv-scan.sh root
  allow_failure: false

audit:backend:
  extends: .osv_scanner
  stage: test
  rules:
    - if: '$SCHEDULE == "AUDIT"'
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - telemetry-backend/package.json
        - telemetry-backend/pnpm-lock.yaml
      when: on_success
    - when: never
  script:
    - sh scripts/osv-scan.sh backend
  allow_failure: true # It defeats it's purpose to fail the pipeline if vulnerabilities are found, as it's optional anyway and has nothing to do with the application. This just serves as a warning.

sonarcloud-check:
  stage: test
  timeout: 5 minutes
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == \"main\""
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - src/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never
  retry: 2
  interruptible: true
  allow_failure: false
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  cache:
    key: sonar-${CI_DEFAULT_BRANCH}
    paths:
      - .sonar/cache
    policy: pull-push
  needs:
    - job: bump version
      artifacts: true
    - job: install dependencies
      artifacts: false
    - job: test
      artifacts: true
  before_script:
    - test -f coverage/lcov.info && echo "LCOV report found" || echo "LCOV report NOT found"
    - test -f coverage/cobertura-coverage.xml && echo "Cobertura report found" || echo "Cobertura report NOT found"
  script:
    - sonar-scanner

telemetry-backend test:
  stage: test
  image: node:${NODE_VERSION}
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - telemetry-backend/**/*
      when: on_success
    - when: never
  cache: []
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - echo "Running telemetry-backend tests..."
    - corepack enable
    - corepack install
  script:
    - cd telemetry-backend && pnpm install --frozen-lockfile && pnpm typecheck && pnpm test
  allow_failure: false
