        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:${VERSION} \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:next \
        -f docker/Dockerfile .

