################################################################# RELEASE STAGE JOBS ##################################################################

build and deploy docker images:
  extends: .docker_build_base
  stage: release
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
    - job: sonarcloud-check
      artifacts: false
      optional: true
    - job: generate changelog
      artifacts: true
  script:
    - source build.env
    - |
      # :latest and :next are now SEPARATE images with different UPDATE_CHANNEL build args.
      # :latest → UPDATE_CHANNEL=stable (version-checker defaults to stable channel)
      # :next   → UPDATE_CHANNEL=beta   (version-checker defaults to beta channel, built by a parallel job)
      # This ensures the correct channel is always baked in regardless of the running version number —
      # a :next image carrying a promoted-stable version (e.g. 2026.6.4, no bN) would previously
      # derive 'stable' from the version string; now it always gets 'beta' from the image default.
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --build-arg UPDATE_CHANNEL=stable \
        --push \
        --provenance=true \
        --sbom=true \
        --platform linux/amd64,linux/arm64 \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:${VERSION} \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:latest \
        -f docker/Dockerfile .

create gitlab release:
  stage: release
  image: alpine:latest
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  needs:
    - job: initialise variables
      artifacts: false
    - job: bump version
      artifacts: true
    - job: generate release notes
      artifacts: true
    - job: build and deploy docker images
      artifacts: false
    - job: build and deploy beta docker images
      artifacts: false
  before_script:
    - apk add --no-cache curl jq
  script:
    - source build.env
    - TAG="v${VERSION}"
    - |
      # Create the stable release (and its tag, from CI_COMMIT_SHA) via the GitLab
      # Releases API — no go-semantic-release. The description is the folded,
      # pre-release-free changelog produced by the generate-changelog job.
      HTTP_STATUS=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg name "${TAG}" \
          --arg tag_name "${TAG}" \
          --arg ref "${CI_COMMIT_SHA}" \
          --rawfile description UNRELEASED-CHANGELOG.md \
          '{name: $name, tag_name: $tag_name, ref: $ref, description: $description}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      if [ "${HTTP_STATUS}" = "201" ]; then
        echo "Release ${TAG} created"
      elif [ "${HTTP_STATUS}" = "409" ]; then
        echo "Release ${TAG} already exists, skipping"
      else
        echo "Failed to create release (HTTP ${HTTP_STATUS}):"
        cat /tmp/release_response.json
        exit 1
      fi

build and deploy beta docker images:
  extends: .docker_build_base
  stage: release
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "next")'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
    - job: sonarcloud-check
      artifacts: false
      optional: true
    - job: generate changelog
      artifacts: true
  script:
    - source build.env
    - |
      # The :next (beta-channel) image, built with UPDATE_CHANNEL=beta so beta-channel
      # followers keep receiving beta notifications even when :next holds a promoted-stable
      # version. This single job serves BOTH branches:
      #   next branch → tag :${VERSION} (immutable beta pin) AND :next
      #   main branch → tag :next ONLY; the :${VERSION} and :latest tags belong to the
      #                 separate stable-channel "build and deploy docker images" job, so we
      #                 must not clobber :${VERSION} with this beta-channel digest.
      TAGS="-t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:next"
      if [ "${CI_COMMIT_BRANCH}" = "next" ]; then
        TAGS="${TAGS} -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:${VERSION}"
      fi
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --build-arg UPDATE_CHANNEL=beta \
        --push \
        --provenance=true \
        --sbom=true \
        --platform linux/amd64,linux/arm64 \
        ${TAGS} \
        -f docker/Dockerfile .

create gitlab prerelease:
  stage: release
  image: alpine:latest
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "next"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  needs:
    - job: initialise variables
      artifacts: false
    - job: bump version
      artifacts: true
    - job: generate release notes
      artifacts: true
    - job: build and deploy beta docker images
      artifacts: false
  before_script:
    - apk add --no-cache curl jq
  script:
    - source build.env
    - TAG="v${VERSION}"
    - |
      HTTP_STATUS=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg name "${TAG}" \
          --arg tag_name "${TAG}" \
          --arg ref "${CI_COMMIT_SHA}" \
          --rawfile description UNRELEASED-CHANGELOG.md \
          '{name: $name, tag_name: $tag_name, ref: $ref, description: $description}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      if [ "${HTTP_STATUS}" = "201" ]; then
        echo "Release ${TAG} created"
      elif [ "${HTTP_STATUS}" = "409" ]; then
        echo "Release ${TAG} already exists, skipping"
      else
        echo "Failed to create release (HTTP ${HTTP_STATUS}):"
        cat /tmp/release_response.json
        exit 1
      fi

.ssh_deploy: &ssh_deploy
  - apk add --no-cache openssh-client curl bash
  # Install the mise-pinned, PQ-capable sops (version from mise.toml) — NOT alpine's
  # apk sops, which may be too old to decrypt the native post-quantum (ML-KEM) age key.
  - curl https://mise.run | sh
  - export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
  - mise trust
  - mise install sops
  - mise reshim
  - mkdir -p ~/.ssh
  - echo "${SSH_KEY}" | base64 -d > ~/.ssh/id_rsa
  - chmod 700 ~/.ssh
  - chmod 600 ~/.ssh/id_rsa
  - ssh-keyscan -t rsa ${TELEMETRY_HOST} >> ~/.ssh/known_hosts

# Pull latest on the server, decrypt telemetry-backend/.env from its committed SOPS .enc in the
# runner (ci/decrypt-env.sh), and copy the plaintext .env to the server. The age key lives ONLY in
# a GitLab CI/CD variable — preferred File-type SOPS_AGE_KEY_FILE (set via `pnpm sops:sync-ci`), or a
# masked SOPS_AGE_KEY; sops reads either. The server stores neither sops nor the key. sops is the
# mise-pinned, PQ/ML-KEM-capable version (see mise.toml), on PATH from the *ssh_deploy step.
.deploy_backend_env: &deploy_backend_env
  - ssh ${TELEMETRY_USER}@${TELEMETRY_HOST} "cd ${TELEMETRY_PATH} && git fetch origin ${CI_COMMIT_BRANCH} && git checkout ${CI_COMMIT_BRANCH} && git pull origin ${CI_COMMIT_BRANCH}"
  - sh ci/decrypt-env.sh
  - scp telemetry-backend/.env "${TELEMETRY_USER}@${TELEMETRY_HOST}:${TELEMETRY_PATH}/telemetry-backend/.env"
  - rm -f telemetry-backend/.env

deploy telemetry-backend:
  stage: release
  image: alpine:latest
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "next")'
      changes:
        - telemetry-backend/**/*
      when: on_success
    - when: never
  cache: []
  needs:
    - job: build and deploy docker images
      artifacts: false
      optional: true
    - job: telemetry-backend test
      artifacts: false
  before_script:
    - *ssh_deploy
  script:
    - *deploy_backend_env
    - ssh ${TELEMETRY_USER}@${TELEMETRY_HOST} "cd ${TELEMETRY_PATH} && NODE_VERSION=$(cat .nvmrc) docker compose -f telemetry-backend/docker-compose.yml up --build -d"

# After a bridge release (new version tagged), restart the backend so it regenerates
# badges immediately with the new release data instead of waiting for the next interval.
refresh telemetry-backend:
  stage: release
  image: alpine:latest
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "next")'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  needs:
    - job: create gitlab release
      artifacts: false
      optional: true
    - job: create gitlab prerelease
      artifacts: false
      optional: true
    - job: deploy telemetry-backend
      artifacts: false
      optional: true
  before_script:
    - *ssh_deploy
  script:
    - *deploy_backend_env
    - ssh ${TELEMETRY_USER}@${TELEMETRY_HOST} "cd ${TELEMETRY_PATH} && NODE_VERSION=$(cat .nvmrc) docker compose -f telemetry-backend/docker-compose.yml up -d"

prepare dockerhub readme:
  stage: release
  image: alpine:latest
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - README.md
      when: on_success
    - when: never
  cache: []
  needs: []
  script:
    # Docker Hub hosts only the README — relative repo links (./docs/..., ./config.example.yml)
    # 404 there. Rewrite them to absolute GitLab blob URLs so they resolve from Docker Hub.
    # Intra-page #anchors and already-absolute http(s) links are left untouched.
    - sed "s#](\./#](${CI_PROJECT_URL}/-/blob/${CI_DEFAULT_BRANCH}/#g" README.md > README.dockerhub.md
  artifacts:
    paths:
      - README.dockerhub.md
    expire_in: 1 hour

update dockerhub description:
  stage: release
  image: peterevans/dockerhub-description:4
  interruptible: true
  variables:
    # Push the link-rewritten copy from "prepare dockerhub readme", not the repo README,
    # so the description shown on Docker Hub has working links.
    README_FILEPATH: ${CI_PROJECT_DIR}/README.dockerhub.md
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - README.md
      when: on_success
    - when: never
  cache: []
  needs:
    - job: prepare dockerhub readme
      artifacts: true
    - job: build and deploy docker images
      artifacts: false
      optional: true
  script:
    - "--pipeline"
