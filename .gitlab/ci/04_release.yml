################################################################# RELEASE STAGE JOBS ##################################################################

build and deploy docker images:
  extends: .docker_build_base
  stage: release
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
    - job: sonarcloud-check
      artifacts: false
      optional: true
    - job: generate changelog
      artifacts: true
  script:
    - source build.env
    - |
      # A stable build also moves the :next (beta-channel) tag to the leading edge.
      # In this CalVer scheme a stable VERSION always outranks the last beta — a
      # final release beats its own bN pre-releases of the same base, and a later
      # base wins outright (time only moves forward, so cross-month can't invert
      # it). So :next followers never have to jump between :next and :latest: they
      # stay on :next and receive whichever is newer, the latest beta or a stable
      # that has overtaken it. All tags push off one manifest, so it's atomic.
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --push \
        --provenance=true \
        --sbom=true \
        --platform linux/amd64,linux/arm64 \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:${VERSION} \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:latest \
        -t ${DOCKER_REGISTRY}/${DOCKERHUB_REPOSITORY}:next \
        -f docker/Dockerfile .

create gitlab release:
  stage: release
  image: alpine:latest
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  cache: []
  needs:
    - job: initialise variables
      artifacts: false
    - job: bump version
      artifacts: true
    - job: generate release notes
      artifacts: true
    - job: build and deploy docker images
      artifacts: false
  before_script:
    - apk add --no-cache curl jq
  script:
    - source build.env
    - TAG="v${VERSION}"
    - |
      # Create the stable release (and its tag, from CI_COMMIT_SHA) via the GitLab
      # Releases API — no go-semantic-release. The description is the folded,
      # pre-release-free changelog produced by the generate-changelog job.
      HTTP_STATUS=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
        --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(jq -n \
          --arg name "${TAG}" \
          --arg tag_name "${TAG}" \
          --arg ref "${CI_COMMIT_SHA}" \
          --rawfile description UNRELEASED-CHANGELOG.md \
          '{name: $name, tag_name: $tag_name, ref: $ref, description: $description}')" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")
      if [ "${HTTP_STATUS}" = "201" ]; then
        echo "Release ${TAG} created"
      elif [ "${HTTP_STATUS}" = "409" ]; then
        echo "Release ${TAG} already exists, skipping"
      else
        echo "Failed to create release (HTTP ${HTTP_STATUS}):"
        cat /tmp/release_response.json
        exit 1
      fi

