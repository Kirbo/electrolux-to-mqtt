  extends: .docker_build_base
  stage: release
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "next"'
      changes:
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - tsconfig.json
      when: on_success
    - when: never
  needs:
    - job: initialise variables
      artifacts: true
    - job: bump version
      artifacts: true
    - job: sonarcloud-check
      artifacts: false
      optional: true
    - job: generate changelog
      artifacts: true
  script:
    - source build.env
    - |
      docker buildx build \
        --builder "${BUILDER_NAME}" \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg VERSION=${VERSION} \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=${CI_COMMIT_SHORT_SHA} \
        --push \
        --provenance=true \
