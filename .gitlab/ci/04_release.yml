update telemetry backend:
  stage: release
  image: alpine:latest
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "next")'
      changes:
        - telemetry-backend/**/*
        - telemetry-backend/package.json
        - telemetry-backend/pnpm-lock.yaml
      when: on_success
    - when: never
  cache: []
  needs:
    - job: build and deploy docker images
      artifacts: false
      optional: true
    - job: telemetry-backend test
      artifacts: false
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "${SSH_KEY}" | base64 -d > ~/.ssh/id_rsa
    - chmod 700 ~/.ssh
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -t rsa ${TELEMETRY_HOST} >> ~/.ssh/known_hosts
  script:
    - ssh ${TELEMETRY_USER}@${TELEMETRY_HOST} "cd ${TELEMETRY_PATH} && git fetch origin ${CI_COMMIT_BRANCH} && git checkout ${CI_COMMIT_BRANCH} && git pull origin ${CI_COMMIT_BRANCH} && ./telemetry-backend/start.sh"

update dockerhub description:
  stage: release
  image: peterevans/dockerhub-description:4
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: never
    - if: '$CI_COMMIT_TAG == null && $CI_COMMIT_BRANCH == "main"'
      changes:
        - README.md
      when: on_success
    - when: never
  cache: []
  needs:
    - job: build and deploy docker images
      artifacts: false
      optional: true
  script:
    - "--pipeline"
