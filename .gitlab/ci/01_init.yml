################################################################### INIT STAGE JOBS ###################################################################

initialise variables:
  stage: init
  image: alpine:latest
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - telemetry-backend/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never
  cache: []
  artifacts:
    reports:
      dotenv: variables.env
  script:
    - touch variables.env
    - echo "NODE_VERSION=$(cat .nvmrc)-alpine3.23" >> variables.env

bump version:
  stage: init
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  interruptible: true
  extends: .rules_code_changes
  cache: []
  artifacts:
    paths:
      - .version-unreleased
      - build.env
      - UNRELEASED-CHANGELOG.md
      - sonar-project.properties
    expire_in: never
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
    - git fetch origin "$CI_DEFAULT_BRANCH" || true
    # Create a real local branch so go-semantic-release detects the branch name correctly
    # (GitLab CI checks out in detached HEAD mode, causing it to report the SHA as branch).
    - git checkout -B "$CI_COMMIT_BRANCH" || true
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "next" ]; then
        echo "[bump-version] branch=next — computing RC version"
        # Step 1: compute the base version (e.g. 1.18.5, or 1.19.0 once a feat
        # lands) and the changelog since the last stable release.
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry
        BASE_VERSION=$(cat .version-unreleased)
        echo "[bump-version] base_version=${BASE_VERSION}"
        # Step 2: the rc number always advances — highest existing rc tag for this
        # base plus 1, else rc.1. A base bump has no rc tags yet, so it resets to
        # rc.1 (e.g. 1.18.5-rc.5 + feat -> 1.19.0-rc.1). See scripts/compute-rc-version.sh.
        FINAL_VERSION=$(git tag --list "v${BASE_VERSION}-rc.*" | sh scripts/compute-rc-version.sh "$BASE_VERSION")
        echo "[bump-version] final_version=${FINAL_VERSION}"
        echo "${FINAL_VERSION}" > .version-unreleased
        sed -i "s/## ${BASE_VERSION}/## ${FINAL_VERSION}/g" UNRELEASED-CHANGELOG.md
        # Safeguard: next branch must never produce a bare production version.
        case "$FINAL_VERSION" in
          *-rc.*) ;;
          *) echo "[bump-version] ERROR: version '${FINAL_VERSION}' has no -rc.N suffix on next branch" ; exit 1 ;;
        esac
      else
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry
      fi
    - export VERSION=$(cat .version-unreleased)
    - echo "VERSION=${VERSION}" > build.env
    - echo "sonar.projectVersion=${VERSION}" >> sonar-project.properties
    - cat UNRELEASED-CHANGELOG.md

install dependencies:
  stage: init
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes_or_schedule
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: push
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - echo "Node version from .nvmrc:"
    - echo "$(cat .nvmrc)"
    - node --version
    - npm --version
    - pnpm --version
  script:
    - echo "Installing dependencies..."
    - pnpm install --frozen-lockfile --config.scripts-prepend-node-path=true
