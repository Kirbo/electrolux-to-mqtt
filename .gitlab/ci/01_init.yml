################################################################### INIT STAGE JOBS ###################################################################

initialise variables:
  stage: init
  image: alpine:latest
  interruptible: true
  rules:
    - if: $SCHEDULE
      when: on_success
    - if: "$CI_COMMIT_TAG == null"
      changes:
        - biome.jsonc
        - docker/Dockerfile
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - src/**/*
        - telemetry-backend/**/*
        - tests/**/*
        - tsconfig.json
        - vitest.config.ts
        - vitest.setup.ts
      when: on_success
    - when: never
  cache: []
  artifacts:
    reports:
      dotenv: variables.env
  script:
    - touch variables.env
    - echo "NODE_VERSION=$(cat .nvmrc)-alpine3.23" >> variables.env

bump version:
  stage: init
  image: alpine:latest
  interruptible: true
  extends: .rules_code_changes
  cache: []
  artifacts:
    paths:
      - .version-unreleased
      - build.env
      - sonar-project.properties
    expire_in: never
  before_script:
    - apk add --no-cache git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
  script:
    - |
      # CalVer, Home Assistant style: stable "YYYY.M.MICRO", beta "YYYY.M.MICRObN".
      # MICRO is 0-based per month, betas are 1-based. The month is non-padded;
      # BusyBox `date` has no %-m, so strip a single leading zero explicitly.
      YEAR=$(date -u +%Y)
      MONTH=$(date -u +%m); MONTH=${MONTH#0}
      ALL_TAGS=$(git tag --list 'v*')
      # Next stable base for this year.month: (highest stable micro)+1, else .0.
      BASE=$(printf '%s\n' "$ALL_TAGS" | sh scripts/compute-calver-base.sh "$YEAR" "$MONTH")
      echo "[bump-version] year=${YEAR} month=${MONTH} stable_base=${BASE}"
      if [ "$CI_COMMIT_BRANCH" = "next" ]; then
        # Beta track: append bN ((highest beta for this base)+1, else b1).
        VERSION=$(printf '%s\n' "$ALL_TAGS" | sh scripts/compute-calver-beta.sh "$BASE")
        # Incremental release notes: commits since the nearest tag (last beta/stable).
        PREV=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)
        # Safeguard: the next branch must always carry a bN pre-release suffix.
        case "$VERSION" in
          *b[0-9]*) ;;
          *) echo "[bump-version] ERROR: '${VERSION}' has no bN suffix on next branch"; exit 1 ;;
        esac
      else
        # Stable track: the bare CalVer base.
        VERSION=$BASE
        # Release notes: commits since the last STABLE tag (beta/rc commits fold in).
        PREV=$(git describe --tags --abbrev=0 --match 'v[0-9]*' --exclude '*b[0-9]*' --exclude '*-rc.*' HEAD 2>/dev/null || true)
      fi
      # First release ever (no prior tag): fall back to the repo root commit.
      if [ -z "$PREV" ]; then
        PREV=$(git rev-list --max-parents=0 HEAD | tail -n 1)
      fi
      echo "[bump-version] version=${VERSION} range=${PREV}..HEAD"
      printf '%s\n' "$VERSION" > .version-unreleased
      {
        printf 'VERSION=%s\n' "$VERSION"
        printf 'CHANGELOG_RANGE=%s..HEAD\n' "$PREV"
      } > build.env
      printf 'sonar.projectVersion=%s\n' "$VERSION" >> sonar-project.properties
    - cat build.env

generate release notes:
  stage: init
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  interruptible: true
  extends: .rules_code_changes
  cache: []
  # git-cliff reads tags via embedded gix; mark the checkout safe to avoid a
  # dubious-ownership refusal regardless of the runner's UID mapping.
  variables:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: safe.directory
    GIT_CONFIG_VALUE_0: "*"
  needs:
    - job: bump version
      artifacts: true
  artifacts:
    paths:
      - UNRELEASED-CHANGELOG.md
    expire_in: never
  script:
    # VERSION + CHANGELOG_RANGE (e.g. "v1.19.0..HEAD") come from the bump job.
    - . ./build.env
    - |
      set -e
      # git-cliff produces the per-release notes in the go-semantic-release default
      # format (see cliff.toml). It replaces go-semantic-release's GENERATOR only —
      # combine-changelogs still AGGREGATES these into the full CHANGELOG.md.
      # On main, pre-release tags inside the range (old -rc.N and new bN) fold into
      # the stable section. git-cliff writes to a temp file rather than piping into
      # sed, so a git-cliff failure fails the job instead of being masked by sed's
      # exit code (dash has no reliable pipefail).
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        git-cliff --config cliff.toml --ignore-tags '(-rc\.[0-9]+|b[0-9]+)$' --tag "v${VERSION}" "${CHANGELOG_RANGE}" > notes.tmp
      else
        git-cliff --config cliff.toml --tag "v${VERSION}" "${CHANGELOG_RANGE}" > notes.tmp
      fi
      sed '1{/^$/d;}' notes.tmp > UNRELEASED-CHANGELOG.md
      rm -f notes.tmp
    - echo "===== UNRELEASED-CHANGELOG.md =====" && cat UNRELEASED-CHANGELOG.md

install dependencies:
  stage: init
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes_or_schedule
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: push
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - echo "Node version from .nvmrc:"
    - echo "$(cat .nvmrc)"
    - node --version
    - npm --version
    - pnpm --version
  script:
    - echo "Installing dependencies..."
    - pnpm install --frozen-lockfile --config.scripts-prepend-node-path=true
