################################################################### INIT STAGE JOBS ###################################################################

initialise variables:
  stage: init
  image: alpine:latest
  interruptible: true
  extends: .rules_code_changes_or_schedule
  cache: []
  artifacts:
    reports:
      dotenv: variables.env
  script:
    - touch variables.env
    - echo "NODE_VERSION=$(cat .nvmrc)-alpine3.23" >> variables.env

bump version:
  stage: init
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  interruptible: true
  extends: .rules_code_changes
  cache: []
  artifacts:
    paths:
      - .version-unreleased
      - build.env
      - UNRELEASED-CHANGELOG.md
      - sonar-project.properties
    expire_in: never
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
    - git fetch origin "$CI_DEFAULT_BRANCH" || true
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "next" ]; then
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --prerelease --dry
        BASE_VERSION=$(cat .version-unreleased)
        LAST_N=$(git tag --list "v${BASE_VERSION}-rc.*" | sed 's/.*-rc\.//' | sort -n | tail -1)
        N=$(( ${LAST_N:-0} + 1 ))
        RC_VERSION="${BASE_VERSION}-rc.${N}"
        echo "${RC_VERSION}" > .version-unreleased
        sed -i "s/## ${BASE_VERSION}/## ${RC_VERSION}/" UNRELEASED-CHANGELOG.md
      else
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry
      fi
    - export VERSION=$(cat .version-unreleased)
    - echo "VERSION=${VERSION}" > build.env
    - echo "sonar.projectVersion=${VERSION}" >> sonar-project.properties
    - cat UNRELEASED-CHANGELOG.md

install dependencies:
  stage: init
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes_or_schedule
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: push
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - echo "Node version from .nvmrc:"
    - echo "$(cat .nvmrc)"
    - node --version
    - npm --version
    - pnpm --version
  script:
    - echo "Installing dependencies..."
    - pnpm install --frozen-lockfile --config.scripts-prepend-node-path=true
