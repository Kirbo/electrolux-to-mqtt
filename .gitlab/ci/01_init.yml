################################################################### INIT STAGE JOBS ###################################################################

initialise variables:
  stage: init
  image: alpine:latest
  interruptible: true
  extends: .rules_code_changes_or_schedule
  cache: []
  artifacts:
    reports:
      dotenv: variables.env
  script:
    - touch variables.env
    - echo "NODE_VERSION=$(cat .nvmrc)-alpine3.23" >> variables.env

bump version:
  stage: init
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  interruptible: true
  extends: .rules_code_changes
  cache: []
  artifacts:
    paths:
      - .version-unreleased
      - build.env
      - UNRELEASED-CHANGELOG.md
      - sonar-project.properties
    expire_in: never
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
    - git fetch origin "$CI_DEFAULT_BRANCH" || true
    # Create a real local branch so go-semantic-release detects the branch name correctly
    # (GitLab CI checks out in detached HEAD mode, causing it to report the SHA as branch).
    - git checkout -B "$CI_COMMIT_BRANCH" || true
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "next" ]; then
        # First run: compute base version (e.g. 1.16.3) and changelog since last stable.
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry
        BASE_VERSION=$(cat .version-unreleased)
        MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
        # Find the highest existing RC tag for this base version and increment, or start at rc.1.
        LATEST_RC=$(git tag -l "v${BASE_VERSION}-rc.*" --sort=-v:refname | head -1)
        if [ -z "$LATEST_RC" ]; then
          RC_NUM=1
          # rc.1: changelog from first run (since last stable) is correct — just fix the header.
        else
          RC_NUM=$(echo "$LATEST_RC" | sed 's/.*-rc\.//')
          RC_NUM=$((RC_NUM + 1))
          # rc.2+: second run scopes changelog to commits since the previous RC.
          # --maintained-version finds v${BASE_VERSION}-rc.N as the latest release
          # (it sorts above the last stable because the patch version is higher).
          semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry --maintained-version "${MAJOR}-rc"
        fi
        echo "${BASE_VERSION}-rc.${RC_NUM}" > .version-unreleased
        sed -i "s/## v${BASE_VERSION}/## v${BASE_VERSION}-rc.${RC_NUM}/g" UNRELEASED-CHANGELOG.md
      else
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry
      fi
    - export VERSION=$(cat .version-unreleased)
    - echo "VERSION=${VERSION}" > build.env
    - echo "sonar.projectVersion=${VERSION}" >> sonar-project.properties
    - cat UNRELEASED-CHANGELOG.md

install dependencies:
  stage: init
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes_or_schedule
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: push
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - echo "Node version from .nvmrc:"
    - echo "$(cat .nvmrc)"
    - node --version
    - npm --version
    - pnpm --version
  script:
    - echo "Installing dependencies..."
    - pnpm install --frozen-lockfile --config.scripts-prepend-node-path=true
