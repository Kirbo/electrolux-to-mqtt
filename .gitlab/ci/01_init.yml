################################################################### INIT STAGE JOBS ###################################################################

initialise variables:
  stage: init
  image: alpine:latest
  interruptible: true
  extends: .rules_code_changes_or_schedule
  cache: []
  artifacts:
    reports:
      dotenv: variables.env
  script:
    - touch variables.env
    - echo "NODE_VERSION=$(cat .nvmrc)-alpine3.23" >> variables.env

bump version:
  stage: init
  image:
    name: registry.gitlab.com/go-semantic-release/semantic-release:latest
    entrypoint: [""]
  interruptible: true
  extends: .rules_code_changes
  cache: []
  artifacts:
    paths:
      - .version-unreleased
      - build.env
      - UNRELEASED-CHANGELOG.md
      - sonar-project.properties
    expire_in: never
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "$CI_REPOSITORY_URL" || echo 'Not a git repository; skipping'
    - git fetch --tags --force || true
    - git fetch origin "$CI_DEFAULT_BRANCH" || true
    # Create a real local branch so go-semantic-release detects the branch name correctly
    # (GitLab CI checks out in detached HEAD mode, causing it to report the SHA as branch).
    - git checkout -B "$CI_COMMIT_BRANCH" || true
  script:
    - |
      if [ "$CI_COMMIT_BRANCH" = "next" ]; then
        echo "[bump-version] branch=next — computing RC version"
        # Step 1: compute base version (e.g. 1.17.0) and full changelog since last stable.
        semantic-release --version-file --allow-no-changes --dry
        BASE_VERSION=$(cat .version-unreleased)
        MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
        echo "[bump-version] base_version=${BASE_VERSION} major=${MAJOR}"
        # Step 2: try --maintained-version to find the last RC and increment.
        # Exits 0 with new RC version when releasable commits exist since last RC.
        # Exits non-zero (65 = no change, other = no prior RC found) — fall back to rc.1.
        SEMREL_EXIT=0
        semantic-release --version-file --changelog UNRELEASED-CHANGELOG.md --dry --maintained-version "${MAJOR}-rc" || SEMREL_EXIT=$?
        echo "[bump-version] maintained-version exit=${SEMREL_EXIT}"
        if [ "$SEMREL_EXIT" -eq 0 ]; then
          echo "[bump-version] prior RC found with new commits — using computed RC"
        else
          echo "[bump-version] maintained-version failed (exit ${SEMREL_EXIT}) — falling back to rc.1"
          echo "${BASE_VERSION}-rc.1" > .version-unreleased
          sed -i "s/## ${BASE_VERSION}/## ${BASE_VERSION}-rc.1/g" UNRELEASED-CHANGELOG.md
        fi
        FINAL_VERSION=$(cat .version-unreleased)
        echo "[bump-version] final_version=${FINAL_VERSION}"
        # Safeguard: next branch must never produce a bare production version.
        case "$FINAL_VERSION" in
          *-rc.*) ;;
          *) echo "[bump-version] ERROR: version '${FINAL_VERSION}' has no -rc.N suffix on next branch" ; exit 1 ;;
        esac
      else
        semantic-release --version-file --allow-no-changes --changelog UNRELEASED-CHANGELOG.md --dry
      fi
    - export VERSION=$(cat .version-unreleased)
    - echo "VERSION=${VERSION}" > build.env
    - echo "sonar.projectVersion=${VERSION}" >> sonar-project.properties
    - cat UNRELEASED-CHANGELOG.md

install dependencies:
  stage: init
  image: node:${NODE_VERSION}
  interruptible: true
  extends: .rules_node_changes_or_schedule
  cache:
    key:
      prefix: ${CI_COMMIT_REF_SLUG}
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
      - node_modules
    policy: push
  needs:
    - job: initialise variables
      artifacts: true
  before_script:
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - echo "Node version from .nvmrc:"
    - echo "$(cat .nvmrc)"
    - node --version
    - npm --version
    - pnpm --version
  script:
    - echo "Installing dependencies..."
    - pnpm install --frozen-lockfile --config.scripts-prepend-node-path=true
